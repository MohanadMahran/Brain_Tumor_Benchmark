# 3D U-Net specific configuration
model: unet3d
base_channels: 60
channel_progression: [60, 120, 240, 480]
in_channels: 4
out_channels: 3
groups: 4               # GroupNorm groups (must divide all channel widths)
dropout_rates: [0.0, 0.0, 0.0, 0.0]

# Optimizer
optimizer: adamw
learning_rate: 3.0e-4
weight_decay: 1.0e-5
warmup_epochs: 10
scheduler: cosine_annealing
min_lr: 1.0e-6

# Target parameter count
target_params_millions: 19.0
param_tolerance: 0.10   # 10% tolerance
